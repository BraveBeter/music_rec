# 项目网络 — 所有服务在独立的 bridge 网络中，避免与其他项目冲突
networks:
  musicrec_net:
    driver: bridge
    name: musicrec_net

services:
  # ---- MySQL 8.0 ----
  musicrec_mysql:
    image: mysql:8.0
    container_name: musicrec_mysql
    hostname: musicrec_mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "13307:3306"
    volumes:
      - musicrec_mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - musicrec_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 7 ----
  musicrec_redis:
    image: redis:7-alpine
    container_name: musicrec_redis
    hostname: musicrec_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "16379:6379"
    volumes:
      - musicrec_redis_data:/data
    networks:
      - musicrec_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI User Backend ----
  musicrec_backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: musicrec_backend
    hostname: musicrec_backend
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: musicrec_mysql
      MYSQL_PORT: 3306
      REDIS_HOST: musicrec_redis
      REDIS_PORT: 6379
    ports:
      - "18000:8000"
    volumes:
      - ./common:/opt/common
      - ./app:/app/app
      - ./ml_pipeline:/app/ml_pipeline
      - ./data:/app/data
    networks:
      - musicrec_net
    depends_on:
      musicrec_mysql:
        condition: service_healthy
      musicrec_redis:
        condition: service_healthy

  # ---- FastAPI Admin Backend ----
  musicrec_admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: musicrec_admin
    hostname: musicrec_admin
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: musicrec_mysql
      MYSQL_PORT: 3306
      REDIS_HOST: musicrec_redis
      REDIS_PORT: 6379
      HTTP_PROXY: http://host.docker.internal:7897
      HTTPS_PROXY: http://host.docker.internal:7897
      NO_PROXY: musicrec_mysql,musicrec_redis,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "19000:8000"
    volumes:
      - ./common:/opt/common
      - ./admin:/app/admin
      - ./ml_pipeline:/app/ml_pipeline
      - ./scripts:/app/scripts
      - ./data:/app/data
    networks:
      - musicrec_net
    depends_on:
      musicrec_mysql:
        condition: service_healthy
      musicrec_redis:
        condition: service_healthy

  # ---- Data Seeder (admin account only) ----
  musicrec_seeder:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: musicrec_seeder
    hostname: musicrec_seeder
    env_file: .env
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@musicrec_mysql:3306/${MYSQL_DATABASE}
    volumes:
      - ./common:/opt/common
      - ./scripts:/app/scripts
    networks:
      - musicrec_net
    depends_on:
      musicrec_mysql:
        condition: service_healthy
    command: >
      bash -c "python scripts/init_admin.py"

  # ---- Vue3 User Frontend (dev) ----
  musicrec_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: musicrec_frontend
    hostname: musicrec_frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: "http://musicrec_backend:8000"
    ports:
      - "13000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - musicrec_net
    depends_on:
      - musicrec_backend

  # ---- Vue3 Admin Frontend (dev) ----
  musicrec_admin_web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: musicrec_admin_web
    hostname: musicrec_admin_web
    restart: unless-stopped
    environment:
      VITE_ADMIN_API_TARGET: "http://musicrec_admin:8000"
    ports:
      - "14000:3001"
    volumes:
      - ./admin-web/src:/app/src
    networks:
      - musicrec_net
    depends_on:
      - musicrec_admin

volumes:
  musicrec_mysql_data:
    name: musicrec_mysql_data
  musicrec_redis_data:
    name: musicrec_redis_data
